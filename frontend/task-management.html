<!DOCTYPE html>
<html>

<head>
  <title>Task Management</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .task-form,
    .task-list {
      margin-top: 20px;
      text-align: left;
    }

    .task-form input,
    .task-form select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .employee-checkbox {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .employee-checkbox input {
      width: auto;
      display: inline-block;
    }
  </style>
</head>

<body onload="loadTasks()">
  <div class="page">
    <div class="card" style="width: 90%; max-width: 1000px;">
      <h2>Supervisor: Manage Tasks</h2>
      
      <div class="task-form" style="background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
        <h3 style="border-bottom: 2px solid #667eea; padding-bottom: 5px; margin-top: 0;">1. Create New Task</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Task Name</label>
            <select id="taskName" onchange="autoFillTaskDetails()">
              <option value="">Select Task...</option>
              <option value="Wash Vegetables">Wash Vegetables</option>
              <option value="Cut Vegetables">Cut Vegetables</option>
              <option value="Cook Food">Cook Food</option>
              <option value="Quality Inspection">Quality Inspection</option>
              <option value="Pack Food">Pack Food</option>
              <option value="Label Packages">Label Packages</option>
              <option value="Load Products">Load Products</option>
            </select>
            
            <label>Section</label>
            <select id="taskSection">
              <option value="Cleaning">Cleaning</option>
              <option value="Processing">Processing</option>
              <option value="Cooking">Cooking</option>
              <option value="Quality Check">Quality Check</option>
              <option value="Packaging">Packaging</option>
              <option value="Labeling">Labeling</option>
              <option value="Dispatch">Dispatch</option>
            </select>
          </div>
          <div>
            <label>Priority</label>
            <select id="taskPriority">
              <option value="High">High Priority</option>
              <option value="Medium">Medium Priority</option>
              <option value="Low">Low Priority</option>
            </select>
            
            <label>Employees Needed</label>
            <input type="number" id="employeesNeeded" min="1" value="1">
          </div>
        </div>
        
        <label>Deadline</label>
        <input type="date" id="taskDeadline">
        
        <label>Required Skills (Auto-filled)</label>
        <input type="text" id="taskSkill" readonly style="background: #f0f0f0;">
        
        <button onclick="createTask()" style="margin-top: 10px; background: #4caf50;">Create Task</button>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        <div class="task-list">
          <h3 style="border-bottom: 2px solid #2196f3; padding-bottom: 5px;">2. Daily Tasks (Click to Assign)</h3>
          <div id="taskList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
        
        <div id="assignmentArea" style="background: #f9f9f9; padding: 15px; border: 1px dashed #ccc; border-radius: 8px;">
          <h3 style="border-bottom: 2px solid #ff9800; padding-bottom: 5px;">3. Employee Suggestions</h3>
          <p id="selectionHint" style="color: #666; font-size: 14px;">Select a task from the list to see qualified employees.</p>
          <div id="suggestedEmployees"></div>
        </div>
      </div>

      <button onclick="goSupervisor()" style="margin-top: 30px; background: #666;">Back to Dashboard</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
