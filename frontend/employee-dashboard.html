<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="page">

<div class="card">

<h2>Employee Dashboard</h2>

<h3 id="employeeName"></h3>

<div class="summary">

<p><b>Days Present:</b> <span id="presentDays"></span></p>

<p><b>Days Absent:</b> <span id="absentDays"></span></p>

<p><b>Productivity Score:</b> <span id="productivity"></span></p>

<div class="employee-tasks" style="margin-top: 20px; text-align: left; background: #fff; padding: 15px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.1);">
  <h3>My Assigned Tasks</h3>
  <div id="employeeTaskList">Loading tasks...</div>
</div>

</div>

<button onclick="logout()">Logout</button>

</div>

</div>
</div>



</div>

<script src="script.js"></script>

<script>
loadEmployeeStats();
loadEmployeeTasks();
</script>

</body>
</html>
