<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | Workforce Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05) !important;
            border-radius: 20px !important;
            padding: 25px;
            margin-bottom: 25px;
        }

        .stat-card {
            border-radius: 16px;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .task-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: #6366f1;
            transform: scale(1.01);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .skill-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin: 4px;
            display: inline-block;
        }

        nav {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">
            <div class="logo-icon"></div>
            Workforce Analytics
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span style="font-weight: 600; font-size: 14px; color: #64748b;" id="navUsername">Staff Portal</span>
            <button onclick="logout()"
                style="background: #fef2f2; color: #ef4444; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;">Logout</button>
        </div>
    </nav>

    <div class="content-container">
        <!-- Header -->
        <div class="premium-card" style="display: flex; align-items: center; gap: 25px;">
            <div class="avatar" id="avatarLetter"
                style="width: 70px; height: 70px; border-radius: 20px; background: #6366f1; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800;">
                E</div>
            <div>
                <h1 style="margin: 0; font-size: 24px; color: #1e293b;" id="employeeName">Welcome Back!</h1>
                <p style="margin: 5px 0 0 0; color: #64748b; font-weight: 500;" id="empDept">Department Information
                    Loading...</p>
            </div>
        </div>

        <!-- Quick Stats Row -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
                <div class="stat-value" id="presentDays">0</div>
                <div class="stat-label">Days Present</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                <div class="stat-value" id="absentDays">0</div>
                <div class="stat-label">Days Absent</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">
                <div class="stat-value" id="productivity">0%</div>
                <div class="stat-label">Attendance Rate</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                <div class="stat-value" id="totalTaskCount">0</div>
                <div class="stat-label">Tasks Assigned</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column: Skills & Charts -->
            <div style="display: flex; flex-direction: column; gap: 25px;">
                <div class="premium-card" style="margin-bottom: 0;">
                    <h3 style="margin-top: 0; font-size: 16px;">My Professional Skills</h3>
                    <div id="employeeSkills" style="margin-top: 15px;"></div>
                </div>

                <div class="premium-card">
                    <h3 style="margin-top: 0; font-size: 16px;">Attendance Overview</h3>
                    <div style="height: 250px; display: flex; justify-content: center;">
                        <canvas id="attendancePieChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Right Column: Tasks -->
            <div style="display: flex; flex-direction: column; gap: 25px;">
                <div class="premium-card" style="flex: 1;">
                    <h3 style="margin-top: 0; font-size: 16px;">Assigned Tasks</h3>
                    <div id="employeeTaskList" style="margin-top: 20px;">
                        <p style="color: #94a3b8; font-size: 14px;">Loading tasks...</p>
                    </div>
                </div>

                <div class="premium-card">
                    <h3 style="margin-top: 0; font-size: 16px;">Progress Analytics</h3>
                    <div style="height: 200px;">
                        <canvas id="taskBarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem("username");
            if (username) {
                document.getElementById("navUsername").innerText = "Logged in as " + username;
            }
            loadEmployeeStats();
            loadEmployeeTasks();
        });
    </script>

</body>

</html>
