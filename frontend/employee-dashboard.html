<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 25px;
    text-align: left;
}
.dash-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    border: 1px solid #eef2ff;
}
.dash-card h3 {
    margin: 0 0 15px 0;
    color: #333;
    font-size: 16px;
    border-bottom: 2px solid #667eea;
    padding-bottom: 8px;
}
.skill-badge {
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin: 4px;
    font-weight: 500;
}
.stat-number {
    font-size: 32px;
    font-weight: 700;
    color: #667eea;
}
.stat-label {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
}
.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}
.avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700;
}
.task-item {
    background: #f9fafb;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 4px solid #667eea;
}
.task-item b { color: #333; }
.task-status-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="page">
<div class="card" style="width: 90%; max-width: 950px;">

    <div class="profile-header">
        <div class="avatar" id="avatarLetter">E</div>
        <div>
            <h2 style="margin: 0;" id="employeeName">Employee Dashboard</h2>
            <p style="margin: 2px 0 0 0; color: #888; font-size: 14px;" id="empDept">Department</p>
        </div>
    </div>

    <!-- Quick Stats Row -->
    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
        <div style="flex: 1; background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 15px; border-radius: 12px; text-align: center;">
            <div class="stat-number" style="color:#fff;" id="presentDays">0</div>
            <div class="stat-label" style="color: #d1fae5;">Days Present</div>
        </div>
        <div style="flex: 1; background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; padding: 15px; border-radius: 12px; text-align: center;">
            <div class="stat-number" style="color:#fff;" id="absentDays">0</div>
            <div class="stat-label" style="color: #fecaca;">Days Absent</div>
        </div>
        <div style="flex: 1; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 15px; border-radius: 12px; text-align: center;">
            <div class="stat-number" style="color:#fff;" id="productivity">0%</div>
            <div class="stat-label" style="color: #c7d2fe;">Productivity</div>
        </div>
        <div style="flex: 1; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; padding: 15px; border-radius: 12px; text-align: center;">
            <div class="stat-number" style="color:#fff;" id="totalTaskCount">0</div>
            <div class="stat-label" style="color: #fde68a;">Tasks Assigned</div>
        </div>
    </div>

    <!-- Skills Section -->
    <div class="dash-card" style="margin-bottom: 20px;">
        <h3>My Skills</h3>
        <div id="employeeSkills">Loading...</div>
    </div>

    <!-- Charts + Tasks Grid -->
    <div class="dashboard-grid">
        <div class="dash-card">
            <h3>Attendance Overview</h3>
            <canvas id="attendancePieChart" height="200"></canvas>
        </div>

        <div class="dash-card">
            <h3>Task Progress</h3>
            <canvas id="taskBarChart" height="200"></canvas>
        </div>

        <div class="dash-card" style="grid-column: 1 / -1;">
            <h3>My Assigned Tasks</h3>
            <div id="employeeTaskList">Loading tasks...</div>
        </div>
    </div>

    <button onclick="logout()" style="margin-top: 25px;">Logout</button>

</div>
</div>

<script src="script.js"></script>
<script>
loadEmployeeStats();
loadEmployeeTasks();
</script>

</body>
</html>
