<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Management | Textile Production Analytics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: 'Inter', sans-serif;}
        .main-content { max-width: 800px; margin: 0 auto; padding: 60px 30px; }
        .back-btn { display: inline-flex;  align-items: center; gap: 8px; padding: 8px 16px; background: #f1f5f9; color: #475569; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; border: 1px solid #e2e8f0; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
        .back-btn:hover { background: #e2e8f0; color: #1e293b; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: calc(100% - 24px); padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .skill-list { list-style: none; padding: 0; }
        .skill-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #e2e8f0; align-items: center;}
        .delete-btn { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-weight: 600; font-size: 12px;}
    </style>
</head>
<body>
    <div class="main-content">
        <a href="supervisor-dashboard.html" class="back-btn">← Back to Hub</a>
        <div class="card">
            <h2>Skill Management</h2>
            <div class="input-group">
                <input type="text" id="skillName" placeholder="Enter New Skill Name (e.g., Knitting Machine Operation)">
            </div>
            <button class="btn-primary" onclick="addSkill()">Add Skill</button>

            <h3 style="margin-top:40px;">Current Skills</h3>
            <ul class="skill-list" id="skillsContainer">
                <li>Loading skills...</li>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/settings';

        async function fetchSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills`);
                const skills = await res.json();
                const container = document.getElementById('skillsContainer');
                container.innerHTML = '';
                if(skills.length === 0) {
                    container.innerHTML = '<li>No skills found. Add one above.</li>';
                    return;
                }
                skills.forEach(skill => {
                    const li = document.createElement('li');
                    li.className = 'skill-item';
                    li.innerHTML = `
                        <span>${skill.name}</span>
                        <button class="delete-btn" onclick="deleteSkill(${skill.id})">Delete</button>
                    `;
                    container.appendChild(li);
                });
            } catch (err) {
                console.error('Error fetching skills:', err);
            }
        }

        async function addSkill() {
            const name = document.getElementById('skillName').value.trim();
            if(!name) { alert('Enter skill name'); return; }
            try {
                await fetch(`${API_BASE}/addSkill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                document.getElementById('skillName').value = '';
                fetchSkills();
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteSkill(id) {
            if(!confirm('Are you sure you want to delete this skill?')) return;
            try {
                await fetch(`${API_BASE}/skills/${id}`, { method: 'DELETE' });
                fetchSkills();
            } catch (err) {
                console.error(err);
            }
        }

        window.onload = fetchSkills;
    </script>
</body>
</html>
