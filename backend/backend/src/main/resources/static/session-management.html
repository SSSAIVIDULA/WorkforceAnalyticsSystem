<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Management | Textile Production Analytics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: 'Inter', sans-serif;}
        .main-content { max-width: 800px; margin: 0 auto; padding: 60px 30px; }
        .back-btn { display: inline-flex;  align-items: center; gap: 8px; padding: 8px 16px; background: #f1f5f9; color: #475569; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; border: 1px solid #e2e8f0; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
        .back-btn:hover { background: #e2e8f0; color: #1e293b; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: calc(100% - 24px); padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .session-list { list-style: none; padding: 0; }
        .session-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #e2e8f0; align-items: center;}
        .delete-btn { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-weight: 600; font-size: 12px;}
    </style>
</head>
<body>
    <div class="main-content">
        <a href="supervisor-dashboard.html" class="back-btn">← Back to Hub</a>
        <div class="card">
            <h2>Session (Shift) Management</h2>
            <div class="input-group">
                <input type="text" id="sessionName" placeholder="Enter New Session Name (e.g., Morning Shift)">
            </div>
            <button class="btn-primary" onclick="addSession()">Create Session</button>

            <h3 style="margin-top:40px;">Current Sessions</h3>
            <ul class="session-list" id="sessionsContainer">
                <li>Loading sessions...</li>
            </ul>

            <h3 style="margin-top:40px;">Assign Employee to Session</h3>
            <div class="input-group" style="display: flex; gap: 10px;">
                <select id="empSelect" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: white;"></select>
                <select id="sessionSelect" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: white;"></select>
                <button class="btn-primary" onclick="assignEmployeeToSession()">Assign</button>
            </div>
            
            <h4 style="margin-top:30px;">Current Assignments</h4>
            <ul class="session-list" id="assignmentsContainer">
                <li>Loading assignments...</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Use ConfigurationController endpoint
        const API_BASE = api('/api');

        async function fetchSessions() {
            try {
                const res = await fetch(`${API_BASE}/sessions`);
                const sessions = await res.json();
                const container = document.getElementById('sessionsContainer');
                container.innerHTML = '';
                if(sessions.length === 0) {
                    container.innerHTML = '<li>No sessions found. Create one above.</li>';
                    return;
                }
                sessions.forEach(session => {
                    const li = document.createElement('li');
                    li.className = 'session-item';
                    li.innerHTML = `
                        <span>${session.name}</span>
                        <button class="delete-btn" onclick="deleteSession(${session.id})">Delete</button>
                    `;
                    container.appendChild(li);
                });
                
                // Update session dropdown
                const sel = document.getElementById('sessionSelect');
                sel.innerHTML = '<option value="">Select Session...</option>';
                sessions.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            } catch (err) {
                console.error('Error fetching sessions:', err);
                // Attempt fallback if configuration controller is not registered for some reason
            }
        }

        async function addSession() {
            const name = document.getElementById('sessionName').value.trim();
            if(!name) { alert('Enter session name'); return; }
            try {
                const res = await fetch(`${API_BASE}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if(!res.ok) {
                    alert('Error adding session');
                    return;
                }
                document.getElementById('sessionName').value = '';
                fetchSessions();
            } catch (err) {
                console.error(err);
                alert('Error adding session');
            }
        }

        async function deleteSession(id) {
            if(!confirm('Are you sure you want to delete this session?')) return;
            try {
                await fetch(`${API_BASE}/sessions/${id}`, { method: 'DELETE' });
                fetchSessions();
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchEmployees() {
            try {
                const res = await fetch(api('/api/employees'));
                const employees = await res.json();
                const sel = document.getElementById('empSelect');
                sel.innerHTML = '<option value="">Select Employee...</option>';
                employees.forEach(emp => {
                    sel.innerHTML += `<option value="${emp.id}">${emp.username}</option>`;
                });
            } catch(e) {}
        }

        async function fetchAssignments() {
            try {
                const [esRes, sRes, eRes] = await Promise.all([
                    fetch(`${API_BASE}/employee-sessions`),
                    fetch(`${API_BASE}/sessions`),
                    fetch(api('/api/employees'))
                ]);
                const esMap = await esRes.json();
                const sessions = await sRes.json();
                const employees = await eRes.json();
                
                const sMap = {}; sessions.forEach(s => sMap[s.id] = s.name);
                const eMap = {}; employees.forEach(e => eMap[e.id] = e.username);

                const container = document.getElementById('assignmentsContainer');
                container.innerHTML = '';
                if(esMap.length === 0) {
                    container.innerHTML = '<li>No assignments yet.</li>';
                    return;
                }
                esMap.forEach(es => {
                    const li = document.createElement('li');
                    li.className = 'session-item';
                    li.innerHTML = `
                        <span><b>${eMap[es.employeeId] || 'Unknown'}</b> -> ${sMap[es.sessionId] || 'Unknown'}</span>
                        <button class="delete-btn" onclick="deleteAssignment(${es.id})">Remove</button>
                    `;
                    container.appendChild(li);
                });
            } catch(e) { console.error(e); }
        }

        async function assignEmployeeToSession() {
            const empId = document.getElementById('empSelect').value;
            const sessionId = document.getElementById('sessionSelect').value;
            if(!empId || !sessionId) { alert('Select both employee and session'); return; }
            try {
                await fetch(`${API_BASE}/employee-sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: parseInt(empId), sessionId: parseInt(sessionId) })
                });
                fetchAssignments();
            } catch(e) { console.error(e); }
        }

        async function deleteAssignment(id) {
            if(!confirm('Delete assignment?')) return;
            try {
                await fetch(`${API_BASE}/employee-sessions/${id}`, { method: 'DELETE' });
                fetchAssignments();
            } catch(e) {}
        }

        async function initPage() {
            await fetchSessions();
            await fetchEmployees();
            await fetchAssignments();
        }

        window.onload = initPage;
    </script>
</body>
</html>
